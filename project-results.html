<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JCM Travels | Flight Results</title>
    <link rel="stylesheet" href="shared.css?v=20260612" />
    <link rel="stylesheet" href="project.css?v=20260613j" />
  </head>
  <body class="project-shell">
    <div class="container">
      <header class="project-topbar" id="project-topbar"></header>

      <section class="project-page-header project-results-header">
        <div>
          <p class="project-kicker">Flight Results</p>
          <h1>Compare, filter, and select flights.</h1>
          <div class="project-chip-row" id="project-search-summary"></div>
        </div>
        <div class="project-chip" id="project-results-count">0 flights available</div>
      </section>

      <section class="project-results-hero">
        <div class="project-panel">
          <div>
            <p class="project-kicker">Smart Results</p>
            <h2 class="project-section-title">Filter by price, stops, time, and airline.</h2>
            <p>Use this page for realistic result selection, filter testing, fare locking, and multi-step booking validation.</p>
          </div>
          <div class="project-mini-strip">
            <span class="project-tag">View details</span>
            <span class="project-tag">Lock price</span>
            <span class="project-tag">Book now</span>
          </div>
        </div>
      </section>

      <section class="project-results-layout">
        <aside class="project-panel project-filter-card">
          <h2 class="project-section-title">Filters</h2>
          <div class="project-field">
            <label>Stops</label>
            <div class="project-radio-group">
              <label class="project-radio-card"><input type="radio" name="stops-filter" value="all" checked /> All</label>
              <label class="project-radio-card"><input type="radio" name="stops-filter" value="non-stop" /> Non-stop</label>
              <label class="project-radio-card"><input type="radio" name="stops-filter" value="one-stop" /> 1 Stop</label>
            </div>
          </div>
          <div class="project-field">
            <label for="filter-price">Max Price</label>
            <input id="filter-price" type="range" min="3000" max="25000" step="100" value="25000" />
            <span id="filter-price-value" class="project-chip"></span>
          </div>
          <div class="project-field">
            <label for="filter-departure">Departure Time</label>
            <select id="filter-departure">
              <option value="all">All times</option>
              <option value="morning">Morning</option>
              <option value="afternoon">Afternoon</option>
              <option value="evening">Evening</option>
            </select>
          </div>
          <div class="project-field">
            <label for="filter-airline">Preferred Airline</label>
            <select id="filter-airline">
              <option value="all">All airlines</option>
              <option value="Nimbus Air">Nimbus Air</option>
              <option value="BlueFox Airways">BlueFox Airways</option>
              <option value="CloudRoute Air">CloudRoute Air</option>
              <option value="SunTrail Air">SunTrail Air</option>
              <option value="Nimbus Shuttle">Nimbus Shuttle</option>
              <option value="OrbitLink Air">OrbitLink Air</option>
            </select>
          </div>
          <button class="project-button ghost" id="clear-filters" type="button">Clear Filters</button>
          <p class="project-status" id="project-results-status" aria-live="polite"></p>
        </aside>

        <div>
          <div id="project-selection-banner"></div>
          <p class="project-status project-results-main-status" id="project-results-main-status" aria-live="polite"></p>
          <div id="project-flight-list" class="project-flight-list"></div>
        </div>
      </section>
    </div>
    <script src="project.js?v=20260613n"></script>
  </body>
</html>
