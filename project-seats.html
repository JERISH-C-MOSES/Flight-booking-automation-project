<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JCM Travels | Seat Selection</title>
    <link rel="stylesheet" href="shared.css" />
    <link rel="stylesheet" href="project.css" />
  </head>
  <body class="project-shell">
    <div class="container">
      <header class="project-topbar" id="project-topbar"></header>

      <section class="project-page-header">
        <div>
          <p class="project-kicker">Seat Selection</p>
          <h1>Select available seats and avoid blocked ones.</h1>
          <div class="project-chip-row" id="project-search-summary"></div>
        </div>
      </section>

      <section class="project-grid-two">
        <article class="project-panel project-seat-card">
          <h2 class="project-section-title">Choose Seats</h2>
          <div class="project-seat-legend">
            <span><i class="project-seat-dot available"></i> Available</span>
            <span><i class="project-seat-dot selected"></i> Selected</span>
            <span><i class="project-seat-dot booked"></i> Already booked</span>
          </div>
          <div id="project-seat-grid" class="project-seat-grid"></div>
          <div class="project-inline project-form-actions">
            <button class="project-button primary" id="project-seat-continue" type="button">Continue to Payment</button>
            <a class="project-button secondary" href="project-passengers.html">Back to Travellers</a>
          </div>
          <p class="project-status" id="project-seat-status" aria-live="polite"></p>
        </article>

        <aside class="project-panel">
          <h2 class="project-section-title">Seat Summary</h2>
          <div id="project-seat-summary"></div>
          <div class="project-banner">
            Try clicking an already booked seat for a negative automation scenario.
          </div>
        </aside>
      </section>
    </div>
    <script src="project.js"></script>
  </body>
</html>
